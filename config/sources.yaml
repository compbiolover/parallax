# =============================================================================
# Parallax source registry
# =============================================================================
# THE source model for both media diets. This file is the single source of
# truth for what Parallax ingests, and it is versioned deliberately: every
# conclusion the tool draws should be reproducible against a specific version
# of this registry, and sensitivity-tested against the weighting choices below.
#
# GUARDRAILS (see CLAUDE.md §0):
#   - The "modeled" diet is a documented model of OUTLETS AND PROGRAMS, not any
#     real individual's consumption. No private communications, ever.
#   - Model what is plausibly *consumed*, not merely what is *published*.
#     Distinguish outlet bias from audience consumption.
#   - Represent internal diversity; do not collapse a diet to one voice.
#   - Honor robots.txt, rate limits, and each source's terms. Summarize and
#     link; never republish.
#
# SCHEMA:
#   version        int    Bumped on any change to the source set or weights.
#   updated        date   ISO-8601 date of last change.
#   diets[]
#     id           str    Stable machine id ("self" | "modeled_ce").
#     label        str    Human label for the dashboard.
#     description  str    What this diet models and how it was constructed.
#     strata[]            Sources grouped by medium/role for stratified weighting.
#       id         str    Stratum id.
#       stratum_weight  float  Relative weight of this stratum within the diet.
#                              Weights within a diet are normalized at runtime.
#       rationale  str    Why this stratum is included and how it is weighted.
#       sources[]
#         id          str   Stable machine id, unique within the file.
#         name        str   Display name.
#         medium      enum  news | cable | talk_radio | podcast | youtube | newsletter
#         role        str   Editorial role this source plays in the diet.
#         ingest            How to pull it.
#           type      enum  rss | gdelt | mediacloud | podcast_rss | youtube
#           url       str   Feed / channel URL. null = TODO, verify before use.
#         weight      float Relative weight of this source within its stratum.
#         rationale   str   Why this specific source, in one line.
#         terms       str   Notes on robots.txt / ToS / rate limits if non-obvious.
#
# NOTE ON null URLs: a null `url` is an explicit TODO. Feed URLs must be
# verified live (they move) before the source is activated in ingestion.
# =============================================================================

version: 1
updated: 2026-07-23

# Foundations this registry's downstream scoring targets. Kept here for
# provenance; the scorer is the authority on the active label set.
foundations:
  - care/harm
  - fairness/cheating         # optionally split: equality vs proportionality
  - loyalty/betrayal
  - authority/subversion
  - sanctity/degradation
  - liberty/oppression        # Claude-tagged; not covered by dictionary baseline

diets:
  # ---------------------------------------------------------------------------
  # DIET 1 — the author's own diet ("self").
  # Mainstream / center-left diet, stratified by role. Feed URLs verified live
  # 2026-07-23 (HTTP 200, valid RSS/Atom). This is an editable model: tune the
  # source set and reweight by your real attention. Because the pipeline is
  # symmetric, this diet's foundation skew and blindspots are surfaced with
  # equal prominence.
  # ---------------------------------------------------------------------------
  - id: self
    label: "My diet"
    description: >
      A model of the author's own media consumption: mainstream / center-left
      national news, public broadcasting, and long-form magazines. Weights are a
      first draft — adjust to reflect actual attention. Because the pipeline is
      symmetric, this diet's foundation skew and blindspots are reported as
      prominently as the modeled diet's.
    strata:
      - id: national_dailies
        stratum_weight: 0.40
        rationale: >
          National general-interest dailies — the backbone of the diet. Heavy
          syndication overlap across these and the wires; dedup matters.
        sources:
          - id: self_nyt_home
            name: "The New York Times — Home Page"
            medium: news
            role: "national daily of record"
            ingest:
              type: rss
              url: "https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml"
            weight: 1.0
            rationale: "Highest-attention national daily; broad agenda-setting coverage."
          - id: self_wapo_national
            name: "The Washington Post — National"
            medium: news
            role: "national daily"
            ingest:
              type: rss
              url: "https://feeds.washingtonpost.com/rss/national"
            weight: 0.9
            rationale: "Politics-heavy national coverage; strong care/fairness salience."
          - id: self_guardian_us
            name: "The Guardian — US"
            medium: news
            role: "center-left national daily"
            ingest:
              type: rss
              url: "https://www.theguardian.com/us/rss"
            weight: 0.8
            rationale: "Explicit center-left framing; pronounced care/fairness emphasis."
          - id: self_politico_picks
            name: "Politico — Picks"
            medium: news
            role: "digital politics outlet"
            ingest:
              type: rss
              # Politico's flagship feed (feed index: https://www.politico.com/rss).
              # Genuine and long-standing, but Politico's edge returns 403 to
              # datacenter/bot IPs, so it could NOT be verified from CI on
              # 2026-07-23 — verify from a residential IP before relying on it.
              url: "https://www.politico.com/rss/politicopicks.xml"
            weight: 0.7
            rationale: "Inside-DC politics framing; heavy authority/fairness salience."
          - id: self_ap_topnews
            name: "AP News — Top News"
            medium: news
            role: "wire service"
            ingest:
              type: rss
              # AP dropped official RSS. The community project
              # https://github.com/rererecursive/associated-press-rss can
              # regenerate feeds, but its public S3 host now 404s (dead as of
              # 2026-07-23). Self-host that scraper and point this url at your
              # instance to activate. Left null so ingestion skips it until then.
              url: null
            weight: 0.7
            rationale: "Wire baseline; heavy syndication across the diet — dedup matters."

      - id: public_broadcast
        stratum_weight: 0.35
        rationale: >
          Public and broadcast news — measured, institutional framing that
          contrasts with the opinion-forward outlets in both diets.
        sources:
          - id: self_npr_news
            name: "NPR — News"
            medium: news
            role: "public-radio national desk"
            ingest:
              type: rss
              url: "https://feeds.npr.org/1001/rss.xml"
            weight: 1.0
            rationale: "Broad national coverage; public-radio framing."
          - id: self_npr_politics
            name: "NPR — Politics"
            medium: news
            role: "public-radio politics desk"
            ingest:
              type: rss
              url: "https://feeds.npr.org/1014/rss.xml"
            weight: 0.7
            rationale: "Politics vertical; sharpens the authority/fairness signal."
          - id: self_pbs_newshour
            name: "PBS NewsHour"
            medium: news
            role: "public-television news"
            ingest:
              type: rss
              url: "https://www.pbs.org/newshour/feeds/rss/headlines"
            weight: 0.7
            rationale: "Measured broadcast framing; long-form segments."
          - id: self_bbc_world
            name: "BBC News — World"
            medium: news
            role: "international broadcaster"
            ingest:
              type: rss
              url: "https://feeds.bbci.co.uk/news/world/rss.xml"
            weight: 0.8
            rationale: "Non-US vantage point; counterweight to domestic framing."

      - id: long_form
        stratum_weight: 0.25
        rationale: >
          Long-form magazines and explainer outlets — where framing and moral
          argument are most explicit, so foundation signal is strongest here.
        sources:
          - id: self_atlantic
            name: "The Atlantic"
            medium: news
            role: "long-form magazine"
            ingest:
              type: rss
              url: "https://www.theatlantic.com/feed/all/"
            weight: 1.0
            rationale: "Essayistic, argument-forward; high explicit-morality density."
          - id: self_vox
            name: "Vox"
            medium: news
            role: "explainer / analysis"
            ingest:
              type: rss
              url: "https://www.vox.com/rss/index.xml"
            weight: 0.8
            rationale: "Explainer framing; foregrounds care/fairness reasoning."

  # ---------------------------------------------------------------------------
  # DIET 2 — modeled conservative-evangelical diet ("modeled_ce").
  # A documented MODEL of outlets/programs, stratified by medium and role to
  # represent internal diversity (national cable, talk radio, digital, podcasts/
  # YouTube, newsletters/aggregators) rather than collapsing to a single voice.
  # Stratum weights are a first draft to be sensitivity-tested against Pew /
  # Media Cloud attention data (see LIMITATIONS.md).
  # ---------------------------------------------------------------------------
  - id: modeled_ce
    label: "Modeled conservative-evangelical diet"
    description: >
      A versioned model of a conservative-evangelical information environment.
      Stratified by medium and role to capture internal diversity. This models
      outlets and programs — NOT any individual's consumption. Weights are a
      documented first draft, to be validated against external attention
      benchmarks and sensitivity-tested.
    strata:
      - id: national_cable
        stratum_weight: 0.30
        rationale: >
          Cable remains a large share of conservative news attention. Weighted
          highest but not dominant, to avoid collapsing the diet to cable framing.
        sources:
          - id: ce_foxnews_latest
            name: "Fox News — Latest"
            medium: cable
            role: "dominant national cable news"
            ingest:
              type: rss
              url: "https://moxie.foxnews.com/google-publisher/latest.xml"
            weight: 1.0
            rationale: "Largest-reach conservative cable outlet; anchors the stratum."
          - id: ce_foxnews_opinion
            name: "Fox News — Opinion"
            medium: cable
            role: "cable opinion / commentary"
            ingest:
              type: rss
              url: "https://moxie.foxnews.com/google-publisher/opinion.xml"
            weight: 0.6
            rationale: "Opinion desk carries more explicit foundation framing than hard news."

      - id: talk_radio
        stratum_weight: 0.20
        rationale: >
          Talk radio is under-measured by text-only tools yet central to this
          diet. Ingested via podcast/audio feeds and transcribed (faster-whisper).
        sources:
          - id: ce_dailywire_mattwalsh
            name: "The Matt Walsh Show (The Daily Wire)"
            medium: talk_radio
            role: "commentary talk audio"
            ingest:
              type: podcast_rss
              # Daily Wire flagship commentary program (resolved via iTunes
              # lookup). 2215 episodes with audio enclosures; verified 2026-07-23.
              url: "https://rss.pdrl.fm/1fc256/feeds.megaphone.fm/BVDWV7762869899"
            weight: 1.0
            rationale: "Representative commentary talk audio; transcribe before scoring."

      - id: digital_outlets
        stratum_weight: 0.20
        rationale: >
          Digital-native outlets spanning hard-news-adjacent to explicitly
          faith-framed reporting. Captures written framing at scale.
        sources:
          - id: ce_dailywire_news
            name: "The Daily Wire — News"
            medium: news
            role: "digital conservative outlet"
            ingest:
              type: rss
              url: "https://www.dailywire.com/feeds/rss.xml"   # verified 2026-07-23 (50 items)
            weight: 1.0
            rationale: "High-reach digital conservative outlet."
          - id: ce_thefp
            name: "The Free Press"
            medium: newsletter
            role: "heterodox / center-right digital"
            ingest:
              type: rss
              url: "https://www.thefp.com/feed"
            weight: 0.7
            rationale: "Adds internal diversity; heterodox rather than movement-aligned."

      - id: faith_media
        stratum_weight: 0.20
        rationale: >
          Explicitly evangelical/Christian outlets. Central to the sanctity and
          loyalty framing this project studies; must not be omitted or collapsed
          into generic "conservative."
        sources:
          - id: ce_christianitytoday
            name: "Christianity Today"
            medium: news
            role: "flagship evangelical magazine"
            ingest:
              type: rss
              url: "https://www.christianitytoday.com/rss/"
            weight: 1.0
            rationale: "Mainstream-evangelical framing; strong sanctity/loyalty salience."
          - id: ce_worldnews
            name: "WORLD News Group"
            medium: news
            role: "evangelical newsmagazine"
            ingest:
              type: rss
              # WORLD's main news feed. wng.org also publishes podcast feeds
              # (e.g. worldandeverything.xml) if audio is added later.
              url: "https://wng.org/feeds/rss/topics.rss"   # verified 2026-07-23
            weight: 0.8
            rationale: "Explicitly Christian-worldview reporting; complements CT."

      - id: podcasts_youtube
        stratum_weight: 0.10
        rationale: >
          Long-form podcasts and YouTube programs where framing is least
          filtered. Captions first (youtube-transcript-api), audio fallback.
        sources:
          - id: ce_relatable_stuckey
            name: "Relatable with Allie Beth Stuckey"
            medium: podcast
            role: "long-form evangelical commentary"
            ingest:
              type: podcast_rss
              # Resolved from Apple Podcasts id 1359249098 via iTunes lookup.
              # 1445 episodes with audio enclosures; verified 2026-07-23.
              url: "https://feeds.megaphone.fm/BMDC9964487814"
            weight: 1.0
            rationale: "Explicitly evangelical long-form commentary; transcribe before scoring."
