<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Parallax — moral-foundations mirror</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --ink: #e8eaed; --muted: #9aa0aa;
    --line: #2a2f3a; --self: #4c9be8; --other: #e8894c; --warn: #3a2f1a;
  }
  @media (prefers-color-scheme: light) {
    :root { --bg:#f7f8fa; --panel:#fff; --ink:#1a1d24; --muted:#5c6270;
            --line:#e2e5ea; --self:#2f6fb0; --other:#c46a2e; --warn:#fdf3e2; }
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
    font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  .wrap { max-width: 980px; margin: 0 auto; padding: 28px 20px 60px; }
  h1 { font-size: 22px; margin: 0 0 2px; letter-spacing:-0.01em; }
  .sub { color: var(--muted); margin: 0 0 20px; font-size: 13px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }
  .panel { background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; padding: 18px; }
  .panel h2 { font-size: 13px; text-transform: uppercase; letter-spacing:.06em;
    color: var(--muted); margin: 0 0 12px; font-weight: 600; }
  .jsd { text-align:center; }
  .jsd .num { font-size: 52px; font-weight: 700; letter-spacing:-0.02em; }
  .jsd .scale { color: var(--muted); font-size: 12px; }
  .legend { display:flex; gap:16px; justify-content:center; margin-top:6px; font-size:13px; }
  .legend span { display:inline-flex; align-items:center; gap:6px; }
  .dot { width:11px; height:11px; border-radius:50%; display:inline-block; }
  .cards { margin-top: 18px; display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  @media (max-width: 760px) { .cards { grid-template-columns: 1fr; } }
  .card .meta { color: var(--muted); font-size:12px; margin-bottom:8px; }
  .card p { margin: 0; white-space: pre-wrap; }
  .exec { margin-top:18px; }
  .exec p { margin:0; white-space: pre-wrap; }
  .badge { display:inline-block; font-size:11px; padding:2px 8px; border-radius:20px;
    background:var(--line); color:var(--muted); vertical-align:middle; margin-left:8px; }
  .caveat { margin-top:22px; background:var(--warn); border:1px solid var(--line);
    border-radius:10px; padding:12px 14px; font-size:13px; color:var(--ink); }
  .empty { text-align:center; padding:60px 20px; color:var(--muted); }
  text { fill: var(--muted); }
  svg { display:block; width:100%; height:auto; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Parallax <span id="method-badge"></span></h1>
  <p class="sub" id="subtitle">A moral-foundations mirror for two media diets.</p>
  <div id="app"></div>
</div>

<!-- Generated by `python -m dashboard.export` -->
<script src="./public/data/latest.js" onerror="window.__noData=true"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
const D = window.PARALLAX_DATA;
const app = document.getElementById("app");

if (!D || window.__noData) {
  app.innerHTML = `<div class="empty">No data yet.<br><br>
    Run <code>python -m ingestion run</code>, then
    <code>python -m summarize</code>, then
    <code>python -m dashboard.export</code>,<br>and reload
    (serve with <code>python -m http.server</code> from <code>dashboard/</code>).</div>`;
} else {
  render(D);
}

function render(d) {
  document.getElementById("subtitle").textContent =
    `Generated ${new Date(d.generated_utc).toLocaleString()} · ${d.foundations.length} classic foundations`;
  if (d.summary_method) {
    const b = document.getElementById("method-badge");
    b.className = "badge"; b.textContent = d.summary_method === "claude" ? "Claude summary" : "numbers-only summary";
  }
  const colors = {}; const c = ["--self", "--other", "--muted"];
  d.diets.forEach((di, i) => colors[di.id] = getComputedStyle(document.documentElement).getPropertyValue(c[i] || "--muted").trim());

  const top = document.createElement("div"); top.className = "grid"; app.appendChild(top);

  // JSD panel
  const jp = panel(top, "Divergence");
  if (d.comparison) {
    jp.innerHTML += `<div class="jsd"><div class="num">${d.comparison.jsd.toFixed(3)}</div>
      <div class="scale">Jensen–Shannon · 0 = identical emphasis, 1 = disjoint</div></div>`;
  } else { jp.innerHTML += `<p class="sub">Need two scored diets to compare.</p>`; }
  const leg = document.createElement("div"); leg.className = "legend";
  d.diets.forEach(di => leg.innerHTML += `<span><i class="dot" style="background:${colors[di.id]}"></i>${di.label} · ${di.doc_count}</span>`);
  jp.appendChild(leg);

  // Radar panel
  const rp = panel(top, "Foundation emphasis (composition)");
  radar(rp, d.foundations, d.diets, colors);

  // Diverging bars (log-ratios)
  if (d.comparison) {
    const bp = panel(app, `Over / under-indexing — ${d.comparison.pair[0]} vs ${d.comparison.pair[1]} (log-ratio)`);
    bp.style.marginTop = "18px";
    bars(bp, d.foundations, d.comparison.log_ratios, colors[d.comparison.pair[0]]);
  }

  // Summary cards
  if (d.diets.some(x => x.summary)) {
    const cards = document.createElement("div"); cards.className = "cards"; app.appendChild(cards);
    d.diets.forEach(di => {
      const card = panel(cards, di.label);
      card.className = "panel card";
      card.innerHTML += `<div class="meta">${di.doc_count} stories</div><p>${escapeHtml(di.summary || "—")}</p>`;
    });
  }
  if (d.executive_summary) {
    const ep = panel(app, "Cross-diet executive summary"); ep.className = "panel exec";
    ep.innerHTML += `<p>${escapeHtml(d.executive_summary)}</p>`;
  }

  blindspots(app, d, colors);

  const cav = document.createElement("div"); cav.className = "caveat";
  cav.textContent = "⚠︎ " + d.caveat; app.appendChild(cav);
}

function blindspots(app, d, colors) {
  const bs = d.blindspots || [];
  const p = panel(app, "Blindspots — what each diet covers that the other doesn't");
  p.style.marginTop = "18px";
  if (!bs.length) {
    p.innerHTML += `<p class="sub">No blindspots yet. Run <code>python -m cluster run</code> to cluster stories and detect coverage asymmetry.</p>`;
    return;
  }
  const grid = document.createElement("div"); grid.className = "cards"; p.appendChild(grid);
  d.diets.forEach(di => {
    const col = document.createElement("div"); col.className = "panel card";
    col.style.background = "transparent"; col.style.borderStyle = "dashed";
    col.innerHTML = `<h2 style="color:${colors[di.id]}">${di.label} covers · other misses</h2>`;
    const mine = bs.filter(b => b.dominant_diet === di.id);
    if (!mine.length) { col.innerHTML += `<p class="sub">— none —</p>`; }
    mine.forEach(b => {
      const rep = (b.representative_titles || []).map(t => `<li>${escapeHtml(t)}</li>`).join("");
      col.innerHTML += `<div style="margin-bottom:12px">
        <div style="font-weight:600">${escapeHtml(b.label)}</div>
        <div class="sub">${b.size} stories · ${Math.round(b.dominant_share*100)}% one-sided</div>
        <ul style="margin:6px 0 0; padding-left:18px; color:var(--muted); font-size:13px">${rep}</ul>
      </div>`;
    });
    grid.appendChild(col);
  });
}

function panel(parent, title) {
  const p = document.createElement("div"); p.className = "panel";
  p.innerHTML = `<h2>${title}</h2>`; parent.appendChild(p); return p;
}
function escapeHtml(s) { const e = document.createElement("div"); e.textContent = s; return e.innerHTML; }

function radar(el, foundations, diets, colors) {
  const size = 320, r = size/2 - 46, cx = size/2, cy = size/2, N = foundations.length;
  const maxVal = Math.max(0.001, d3.max(diets, di => d3.max(foundations, f => di.profile[f] || 0)));
  const svg = d3.select(el).append("svg").attr("viewBox", `0 0 ${size} ${size}`);
  const angle = i => (Math.PI * 2 * i / N) - Math.PI/2;
  const pt = (i, v) => [cx + Math.cos(angle(i)) * r * (v/maxVal), cy + Math.sin(angle(i)) * r * (v/maxVal)];

  [0.25, 0.5, 0.75, 1].forEach(g => {
    svg.append("polygon").attr("points", foundations.map((_, i) =>
      (cx + Math.cos(angle(i))*r*g) + "," + (cy + Math.sin(angle(i))*r*g)).join(" "))
      .attr("fill", "none").attr("stroke", "var(--line)");
  });
  foundations.forEach((f, i) => {
    const [ex, ey] = [cx + Math.cos(angle(i))*r, cy + Math.sin(angle(i))*r];
    svg.append("line").attr("x1", cx).attr("y1", cy).attr("x2", ex).attr("y2", ey).attr("stroke", "var(--line)");
    const lx = cx + Math.cos(angle(i))*(r+22), ly = cy + Math.sin(angle(i))*(r+22);
    svg.append("text").attr("x", lx).attr("y", ly).attr("text-anchor", "middle")
      .attr("dominant-baseline", "middle").attr("font-size", 11).text(f);
  });
  diets.forEach(di => {
    const pts = foundations.map((f, i) => pt(i, di.profile[f] || 0));
    svg.append("polygon").attr("points", pts.map(p => p.join(",")).join(" "))
      .attr("fill", colors[di.id]).attr("fill-opacity", 0.18)
      .attr("stroke", colors[di.id]).attr("stroke-width", 2);
    pts.forEach(p => svg.append("circle").attr("cx", p[0]).attr("cy", p[1]).attr("r", 2.5).attr("fill", colors[di.id]));
  });
}

function bars(el, foundations, ratios, color) {
  const w = 900, rowH = 34, h = foundations.length * rowH + 20, cx = w/2;
  const vals = foundations.map(f => ratios[f] || 0);
  const maxAbs = Math.max(0.3, d3.max(vals, Math.abs));
  const x = d3.scaleLinear().domain([-maxAbs, maxAbs]).range([20, w-20]);
  const svg = d3.select(el).append("svg").attr("viewBox", `0 0 ${w} ${h}`);
  svg.append("line").attr("x1", x(0)).attr("x2", x(0)).attr("y1", 6).attr("y2", h-14).attr("stroke", "var(--line)");
  foundations.forEach((f, i) => {
    const v = ratios[f] || 0, y = 10 + i*rowH;
    svg.append("rect").attr("x", Math.min(x(0), x(v))).attr("y", y).attr("height", rowH-14)
      .attr("width", Math.abs(x(v)-x(0))).attr("fill", color).attr("fill-opacity", v>=0?0.8:0.35).attr("rx", 3);
    svg.append("text").attr("x", v>=0 ? x(0)-8 : x(0)+8).attr("y", y+(rowH-14)/2)
      .attr("text-anchor", v>=0?"end":"start").attr("dominant-baseline", "middle").attr("font-size", 12).text(f);
    svg.append("text").attr("x", v>=0 ? x(v)+6 : x(v)-6).attr("y", y+(rowH-14)/2)
      .attr("text-anchor", v>=0?"start":"end").attr("dominant-baseline", "middle")
      .attr("font-size", 11).attr("fill", "var(--ink)").text(v.toFixed(2));
  });
}
</script>
</body>
</html>
